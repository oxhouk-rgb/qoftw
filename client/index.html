<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena 4-Player</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1>ARENA BATTLE</h1>
            <div class="auth-forms">
                <form id="login-form">
                    <h2>Login</h2>
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <form id="register-form">
                    <h2>Register</h2>
                    <input type="text" id="register-username" placeholder="Username" required>
                    <input type="password" id="register-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
            </div>
            <p class="test-accounts">Test accounts: Player1-4, password: 0000</p>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="screen">
        <div class="menu-header">
            <span id="player-name">Player</span>
            <span id="player-currency">💰 0</span>
            <span id="player-rating">⭐ 0</span>
            <button id="logout-btn">Logout</button>
        </div>
        <div class="menu-buttons">
            <button data-screen="arsenal">Arsenal</button>
            <button data-screen="shop">Shop</button>
            <button data-screen="friends">Friends</button>
            <button data-screen="lobby">Play</button>
        </div>
    </div>

    <!-- Arsenal Screen -->
    <div id="arsenal-screen" class="screen">
        <div class="screen-header">
            <button class="back-btn">← Back</button>
            <h2>Arsenal</h2>
        </div>
        <div class="arsenal-content">
            <div class="character-select">
                <h3>Characters</h3>
                <div id="character-list"></div>
            </div>
            <div class="character-detail">
                <div class="character-preview">
                    <canvas id="char-preview-canvas" width="256" height="256"></canvas>
                </div>
                <div class="stats-panel">
                    <h3>Stats</h3>
                    <div id="char-stats"></div>
                </div>
                <div class="equipment-panel">
                    <h3>Equipment (5 slots)</h3>
                    <div id="equipment-slots"></div>
                </div>
                <div class="abilities-panel">
                    <h3>Abilities</h3>
                    <div id="ability-slots"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Shop Screen -->
    <div id="shop-screen" class="screen">
        <div class="screen-header">
            <button class="back-btn">← Back</button>
            <h2>Shop</h2>
        </div>
        <div class="shop-tabs">
            <button class="tab-btn active" data-tab="characters">Characters</button>
            <button class="tab-btn" data-tab="items">Items</button>
        </div>
        <div id="shop-content"></div>
    </div>

    <!-- Friends Screen -->
    <div id="friends-screen" class="screen">
        <div class="screen-header">
            <button class="back-btn">← Back</button>
            <h2>Friends</h2>
        </div>
        <div id="friends-list"></div>
        <div id="party-panel">
            <h3>Party</h3>
            <div id="party-members"></div>
            <button id="invite-friend-btn">Invite Friend</button>
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen">
        <div class="screen-header">
            <button class="back-btn">← Back</button>
            <h2>Game Lobby</h2>
        </div>
        <div class="mode-select">
            <button data-mode="FFA">FFA (4 players)</button>
            <button data-mode="2v2">2v2 (4 players)</button>
            <button data-mode="PVE">PVE (1-2 players)</button>
            <button data-mode="CUSTOM">Custom Game</button>
        </div>
        <div id="lobby-status"></div>
        <button id="start-match-btn" disabled>Find Match</button>
    </div>

    <!-- Battle Screen -->
    <div id="battle-screen" class="screen">
        <div class="battle-ui">
            <div class="battle-header">
                <div id="turn-timer">10</div>
                <div id="battle-mode-indicator">FREE MOVE</div>
            </div>
            <canvas id="battle-canvas" width="900" height="600"></canvas>
            <div class="battle-controls">
                <div id="action-points">AP: 2/2</div>
                <div id="action-menu" class="hidden">
                    <button data-action="move">Move</button>
                    <button data-action="attack">Attack</button>
                    <button data-action="ability1">Ability 1</button>
                    <button data-action="ability2">Ability 2</button>
                    <button data-action="ability3">Ability 3</button>
                    <button data-action="end-turn">End Turn</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
