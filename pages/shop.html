<div class="shop-layout">
    <!-- Shop Menu Panel -->
    <div class="menu-panel">
        <button class="logout-btn" id="back-to-shop" onclick="goBack()" style="display: none;">Вернуться</button>
        <div style="flex: 1;"></div>
        
        <div class="menu-buttons">
            <button class="menu-btn shop-tab active" onclick="openShopTab('characters')">Персонажи</button>
            <button class="menu-btn shop-tab" onclick="openShopTab('items')">Предметы</button>
            <button class="menu-btn shop-tab" onclick="openShopTab('currency')">Валюта</button>
        </div>
        
        <div style="flex: 1;"></div>
        <button class="logout-btn" onclick="goBack()">Вернуться</button>
    </div>

    <!-- Content Area -->
    <div class="scroll-container">
        <div id="factions-container" class="grid-2x2">
            <!-- Factions will be loaded here -->
        </div>
        
        <div id="characters-container" class="hidden">
            <!-- Characters will be loaded here -->
        </div>
        
        <div id="items-container" class="hidden">
            <!-- Items will be loaded here -->
        </div>
        
        <div id="currency-container" class="hidden">
            <div class="settings-section" style="padding: 30px; text-align: center;">
                <h3>Покупка валюты</h3>
                <p style="margin: 20px 0; font-size: 16px;">Выберите количество валюты для покупки</p>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px;">
                    <div class="faction-card" onclick="buyCurrency(1000)">
                        <div class="faction-name">💰 1,000</div>
                        <div class="faction-desc">$4.99</div>
                    </div>
                    <div class="faction-card" onclick="buyCurrency(5000)">
                        <div class="faction-name">💰 5,000</div>
                        <div class="faction-desc">$19.99</div>
                    </div>
                    <div class="faction-card" onclick="buyCurrency(10000)">
                        <div class="faction-name">💰 10,000</div>
                        <div class="faction-desc">$34.99</div>
                    </div>
                    <div class="faction-card" onclick="buyCurrency(50000)">
                        <div class="faction-name">💰 50,000</div>
                        <div class="faction-desc">$149.99</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize shop on load - call directly since DOM is already loaded when content is inserted
    loadFactions();

    function buyCurrency(amount) {
        console.log('Buying currency:', amount);
        alert('Покупка ' + amount.toLocaleString() + ' монет. Здесь будет интеграция с платежной системой.');
    }
</script>
